<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM-WEB 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ff0000;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* PANTALLA DE INICIO */
        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .title {
            text-align: center;
            text-shadow: 0 0 20px #ff0000;
            animation: glitch 0.3s infinite;
        }

        .title h1 {
            font-size: 4em;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .title p {
            font-size: 1.2em;
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px #ff0000; }
            50% { text-shadow: 0 0 20px #ff0000, 2px 2px 10px #00ffff; }
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .play-button {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: 3px solid #ff0000;
            color: #fff;
            padding: 20px 60px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #ff0000;
            transition: all 0.3s;
            text-shadow: 0 0 10px #000;
        }

        .play-button:hover {
            background: linear-gradient(135deg, #ff3333, #ff0000);
            box-shadow: 0 0 40px #ff0000;
            transform: scale(1.1);
        }

        .play-button:active {
            transform: scale(0.95);
        }

        .info-text {
            text-align: center;
            font-size: 0.9em;
            color: #ffff00;
            max-width: 500px;
            line-height: 1.6;
        }

        /* PANTALLA DE JUEGO */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            gap: 10px;
            overflow: hidden;
        }

        #game-screen.active {
            display: flex;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            background-color: rgba(255, 0, 0, 0.1);
            border-bottom: 2px solid #ff0000;
        }

        .exit-button {
            background-color: #cc0000;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 8px 16px;
            font-size: 0.9em;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #ff0000;
            transition: all 0.3s;
        }

        .exit-button:hover {
            background-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        #canvas {
            border: 3px solid #ff0000;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px #ff0000;
            cursor: none;
            max-width: 100%;
            max-height: calc(100vh - 100px);
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            animation: blink 0.5s infinite;
            display: none;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 3px solid #ff0000;
            text-shadow: 0 0 20px #ff0000;
        }

        #loading.active {
            display: block;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .title h1 {
                font-size: 2em;
            }

            .play-button {
                padding: 15px 40px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE MENÚ -->
    <div id="menu-screen">
        <div class="title">
            <h1>🎮 DOOM-WEB 🎮</h1>
            <p>Juega DOOM 1 Original en tu Navegador</p>
        </div>

        <div class="menu-buttons">
            <button class="play-button" onclick="startGame()">▶ JUGAR AHORA</button>
        </div>

        <div class="info-text">
            <p>💡 <strong>Cargando archivo DOOM.WAD original</strong></p>
            <p>🎮 Controles: WASD para moverte, Ratón para mirar</p>
            <p>⚡ Explora el laberinto del demonio</p>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game-screen">
        <div class="game-header">
            <h1>🎮 DOOM - EN JUEGO 🎮</h1>
            <button class="exit-button" onclick="exitGame()">MENÚ (ESC)</button>
        </div>
        
        <canvas id="canvas" width="1024" height="768"></canvas>
        <div id="loading" class="active">CARGANDO DOOM.WAD...</div>
    </div>

    <script src="doom-engine.js"></script>
    <script>
        let gameEngine = null;

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('loading').classList.add('active');

            setTimeout(() => {
                gameEngine = new DoomWADEngine('canvas', 'DOOM - copia.WAD');
                document.getElementById('loading').classList.remove('active');
            }, 500);
        }

        function exitGame() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').style.display = 'flex';
            
            if (gameEngine) {
                gameEngine = null;
            }

            if (document.pointerLockElement) {
                document.exitPointerLock();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('game-screen').classList.contains('active')) {
                exitGame();
            }
        });
    </script>
</body>
</html>
